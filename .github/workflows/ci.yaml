name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        zig-version: ["0.16.0"]
        os: [macos-latest, windows-latest]
        include:
          - zig-version: "0.16.0"
            os: ubuntu-latest
            check-format: true

    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig-version }}

      - if: ${{ matrix.check-format }}
        name: Check Formatting
        run: zig fmt --ast-check --check .

      - name: Run `build`
        run: zig build --summary all
